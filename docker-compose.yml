# ============================================================
#  Library Management System — docker-compose.yml
#  Services: Frontend | Backend | PostgreSQL | Redis | Nginx
# ============================================================

version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: library_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       ${DB_NAME:-library360}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - library-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-library360}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: library_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redisdata:/data
    networks:
      - library-net
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./library-backend
      dockerfile: Dockerfile
      target: production
    container_name: library_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV:           production
      PORT:               3001
      DB_HOST:            postgres
      DB_PORT:            5432
      DB_USER:            ${DB_USER:-postgres}
      DB_PASSWORD:        ${DB_PASSWORD:-postgres}
      DB_NAME:            ${DB_NAME:-library360}
      JWT_SECRET:         ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_HOST:         redis
      REDIS_PORT:         6379
      REDIS_PASSWORD:     ${REDIS_PASSWORD:-redispass}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - library-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./libraryManagementFrontendNextJs/my-app
      dockerfile: Dockerfile
      target: production
    container_name: library_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:              production
      NEXT_PUBLIC_API_URL:   http://backend:3001/api/v1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - library-net

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: library_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - library-net

# ── Volumes ──────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

# ── Networks ─────────────────────────────────────────────────
networks:
  library-net:
    driver: bridge
